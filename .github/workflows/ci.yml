name: Test

on:
  push:
    tags:
      - v*
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Run benchmark
        run: make benchmark
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build
      - name: Run tests
        run: cargo test

  integration_test:
    name: Integration Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Run integration tests
        run: make integration_test

  build:
    name: Build ${{ matrix.platform.project }} - ${{ matrix.platform.release_for }}
    if: github.event.pull_request.draft == false
    strategy:
      matrix:
        platform:
          - release_for: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            project: codebook-lsp
            bin: codebook-lsp.exe
            name: codebook-lsp-x86_64-pc-windows-msvc.zip
            command: build
          - release_for: Windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            project: codebook-lsp
            bin: codebook-lsp.exe
            name: codebook-lsp-aarch64-pc-windows-msvc.zip
            command: build
          - release_for: macOS-x86_64
            os: macOS-latest
            target: x86_64-apple-darwin
            project: codebook-lsp
            bin: codebook-lsp
            name: codebook-lsp-x86_64-apple-darwin.tar.gz
            command: build
          - release_for: macOS-aarch64
            os: macOS-latest
            target: aarch64-apple-darwin
            project: codebook-lsp
            bin: codebook-lsp
            name: codebook-lsp-aarch64-apple-darwin.tar.gz
            command: build
          - release_for: Linux-x86_64-Musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            project: codebook-lsp
            bin: codebook-lsp
            name: codebook-lsp-x86_64-unknown-linux-musl.tar.gz
            command: build
          - release_for: Linux-aarch64-Musl
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            project: codebook-lsp
            bin: codebook-lsp
            name: codebook-lsp-aarch64-unknown-linux-musl.tar.gz
            command: build

    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Disable Defender Real-time Monitoring
        if: matrix.platform.os == 'windows-latest'
        shell: powershell
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Write-Host "Disabled Defender Real-time Monitoring"
      - name: Setup Cargo home directory on D drive
        if: matrix.platform.os == 'windows-latest'
        shell: powershell
        run: |
          # Create directory on D drive if it doesn't exist
          New-Item -ItemType Directory -Force -Path "D:\cargo_home"
          # Set CARGO_HOME for subsequent steps
          echo "CARGO_HOME=D:\cargo_home" >> $env:GITHUB_ENV
          Write-Host "Set CARGO_HOME to D:\cargo_home"
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1.0.7
        with:
          command: ${{ matrix.platform.command }}
          target: ${{ matrix.platform.target }}
          args: "--locked --release --bin ${{ matrix.platform.project }}"
      - name: Package as archive
        shell: bash
        run: |
          cd target/${{ matrix.platform.target }}/release
          if [[ "${{ matrix.platform.os }}" == "windows-latest" ]]; then
            7z a ../../../${{ matrix.platform.name }} ${{ matrix.platform.bin }}
          else
            tar czvf ../../../${{ matrix.platform.name }} ${{ matrix.platform.bin }}
          fi
          cd -
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform.bin }}-${{ matrix.platform.target }}
          path: ${{ matrix.platform.name }}

  vscode_package:
    name: VS Code Package - ${{ matrix.platform.vsce_target }}
    if: github.event.pull_request.draft == false
    needs:
      - build
    strategy:
      matrix:
        platform:
          - vsce_target: linux-x64
            rust_target: x86_64-unknown-linux-musl
            archive: codebook-lsp-x86_64-unknown-linux-musl.tar.gz
            bin: codebook-lsp
          - vsce_target: linux-arm64
            rust_target: aarch64-unknown-linux-musl
            archive: codebook-lsp-aarch64-unknown-linux-musl.tar.gz
            bin: codebook-lsp
          - vsce_target: darwin-x64
            rust_target: x86_64-apple-darwin
            archive: codebook-lsp-x86_64-apple-darwin.tar.gz
            bin: codebook-lsp
          - vsce_target: darwin-arm64
            rust_target: aarch64-apple-darwin
            archive: codebook-lsp-aarch64-apple-darwin.tar.gz
            bin: codebook-lsp
          - vsce_target: win32-x64
            rust_target: x86_64-pc-windows-msvc
            archive: codebook-lsp-x86_64-pc-windows-msvc.zip
            bin: codebook-lsp.exe
          - vsce_target: win32-arm64
            rust_target: aarch64-pc-windows-msvc
            archive: codebook-lsp-aarch64-pc-windows-msvc.zip
            bin: codebook-lsp.exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: editors/vscode
      - name: Download LSP archive
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.platform.bin }}-${{ matrix.platform.rust_target }}
          path: lsp-archive
      - name: Stage LSP binary
        run: |
          mkdir -p editors/vscode/bin
          if [[ "${{ matrix.platform.archive }}" == *.zip ]]; then
            unzip -o "lsp-archive/${{ matrix.platform.archive }}" -d editors/vscode/bin
          else
            tar xzf "lsp-archive/${{ matrix.platform.archive }}" -C editors/vscode/bin
          fi
          chmod +x "editors/vscode/bin/${{ matrix.platform.bin }}" || true
          ls -la editors/vscode/bin
      - name: Package extension
        working-directory: editors/vscode
        run: |
          bun run build
          bunx vsce package \
            --no-dependencies \
            --target ${{ matrix.platform.vsce_target }} \
            -o "codebook-vscode-${{ matrix.platform.vsce_target }}.vsix"
      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: codebook-vscode-${{ matrix.platform.vsce_target }}
          path: editors/vscode/codebook-vscode-${{ matrix.platform.vsce_target }}.vsix

  release:
    name: Release
    permissions:
      contents: write
    needs:
      - build
      - test
      - vscode_package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: codebook-*
      - name: Make release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            codebook-lsp*/*
            codebook-vscode-*/*
          prerelease: true
          generate_release_notes: true
          draft: false
          append_body: true
          body: |
            See [changelog](https://github.com/blopker/codebook/blob/main/CHANGELOG.md) for details.
